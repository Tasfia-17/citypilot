version: "3.9"

services:
  # ── Backend (FastAPI + ADK agents) ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
      - elasticsearch
    volumes:
      - ./backend:/app
      - /app/__pycache__
    command: uvicorn api.server:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    networks:
      - citypilot

  # ── Frontend (Next.js) ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
      NEXT_PUBLIC_WS_URL: ws://backend:8000/ws
      NEXT_PUBLIC_MAPBOX_TOKEN: ${NEXT_PUBLIC_MAPBOX_TOKEN}
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - citypilot

  # ── MongoDB (local dev only — use Atlas in production) ─────────────────────────
  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: citypilot
      MONGO_INITDB_ROOT_PASSWORD: citypilot
      MONGO_INITDB_DATABASE: citypilot
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    networks:
      - citypilot

  # ── Elasticsearch (local dev only — use Elastic Cloud in production) ───────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    restart: unless-stopped
    networks:
      - citypilot
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200"]
      interval: 30s
      retries: 5

volumes:
  mongodb_data:
  elasticsearch_data:

networks:
  citypilot:
    driver: bridge
